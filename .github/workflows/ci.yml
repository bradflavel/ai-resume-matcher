# CI for the tests-and-ci branch work
# runs on every PR and on pushes to main, so merged code is always green
# two independent jobs so client and server can pass or fail on their own

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install deps
        run: npm ci

      # coverage runs the whole test suite and enforces the thresholds we set,
      # so we don't also need a separate "npm test" step
      - name: Test and coverage
        run: npm run coverage

  client:
    name: client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test and coverage
        run: npm run coverage

      # build guards against regressions that only surface at bundle time,
      # like a bad import path that vitest happens to resolve but vite doesn't
      - name: Build
        run: npm run build
